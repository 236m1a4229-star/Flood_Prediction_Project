<!DOCTYPE html>
<html>
<head>
    <title>Flood Prediction System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>Flood Prediction System</h1>

    <form action="/predict" method="POST">

        <input type="number" step="any" name="Temp" placeholder="Temperature" required>

        <input type="number" step="any" name="Humidity" placeholder="Humidity" required>

        <input type="number" step="any" name="Cloud Cover" placeholder="Cloud Cover" required>

        <input type="number" step="any" name="ANNUAL" placeholder="Annual Rainfall" required>

        <input type="number" step="any" name="Jan-Feb" placeholder="Jan-Feb Rainfall" required>

        <input type="number" step="any" name="Mar-May" placeholder="Mar-May Rainfall" required>

        <input type="number" step="any" name="Jun-Sep" placeholder="Jun-Sep Rainfall" required>

        <input type="number" step="any" name="Oct-Dec" placeholder="Oct-Dec Rainfall" required>

        <input type="number" step="any" name="avgjune" placeholder="Average June Rainfall" required>

        <input type="number" step="any" name="sub" placeholder="Sub Region Value" required>

        <button type="submit">Predict Flood</button>

    </form>

</div>

</body>
</html>
